version: "3.8"

services:
  # =========================
  # Backend (Node.js)
  # =========================
  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      PORT: 5000
      DATABASE_URL: postgres://postgres:password@postgres:5432/mydb
    volumes:
      - ./backend:/app
      - /app/node_modules

  # =========================
  # Frontend (React / Vite)
  # =========================
  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # =========================
  # PostgreSQL Database
  # =========================
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

# =========================
# Persistent Volume
# =========================
volumes:
  pgdata: